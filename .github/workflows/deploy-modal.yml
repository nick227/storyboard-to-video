name: Deploy voice-service to Modal

# Manual only -- no push/pull_request trigger. Nothing in this repo running this workflow
# automatically. Also requires MODAL_TOKEN_ID/MODAL_TOKEN_SECRET repo secrets, which aren't
# configured yet, so even a manual run will fail until those are added and you're ready to
# actually deploy.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install modal
      - name: Deploy to Modal
        working-directory: apps/voice-service
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy modal_app.py
