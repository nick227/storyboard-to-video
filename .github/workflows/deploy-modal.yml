name: Deploy Modal TTS services

# Manual deploy only. Automatic deploys run from ci.yml (deploy-voice / deploy-piper)
# after the matching TTS job passes on main — not after the full CI workflow, because
# unrelated web test failures must not block Modal updates.
# Requires repo secrets: MODAL_TOKEN_ID, MODAL_TOKEN_SECRET.
on:
  workflow_dispatch:

jobs:
  deploy-voice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install modal
      - name: Deploy voice-service to Modal
        working-directory: apps/voice-service
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy modal_app.py

  deploy-piper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install modal
      - name: Deploy piper-service to Modal
        working-directory: apps/piper-service
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy modal_app.py
