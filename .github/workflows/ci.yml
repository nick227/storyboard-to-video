name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: storyboard
          POSTGRES_USER: storyboard
          POSTGRES_PASSWORD: storyboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyboard -d storyboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://storyboard:storyboard@localhost:5432/storyboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: Build CSS from stylesheets/*.css (canonical source; public/css/*.css are generated)
        run: npm run css:build
        working-directory: apps/web
      - run: npm run check
        working-directory: apps/web
      - run: npm run prisma:migrate:deploy
        working-directory: apps/web
      - run: npm test
        working-directory: apps/web

  voice-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # main.py's clone endpoint shells out to ffmpeg to normalize uploaded reference
      # audio; ubuntu-latest doesn't guarantee it's preinstalled, and without it every
      # run fails test_clone_synthesize_reference_delete_lifecycle, which blocks
      # deploy-voice (gated on this job) from ever redeploying to Modal.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      # CPU-only wheels: GitHub-hosted runners have no GPU, so the CUDA build in
      # requirements.txt (used by setup.sh / the Modal image) would just waste
      # bandwidth and time here.
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
        working-directory: apps/voice-service
      - run: pip install -r requirements-ci.txt
        working-directory: apps/voice-service
      - run: SPARK_SKIP_MODEL_LOAD=1 pytest test_main.py -v
        working-directory: apps/voice-service

  piper-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
        working-directory: apps/piper-service
      - run: pytest test_main.py -v
        working-directory: apps/piper-service

  # Modal deploys gate on their own TTS job only (not web). Requires MODAL_* secrets.
  # These deploy to the `dev` Modal Environment ONLY -- never prod. Prod is manual-only, via
  # .github/workflows/deploy-modal.yml (workflow_dispatch), so a push to main can never overwrite
  # whatever is currently serving real production traffic.
  deploy-voice:
    needs: voice-service
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install modal
      # dev is auto-bootstrapped-or-skipped, never a hard CI failure -- see
      # .github/scripts/modal-preflight.sh. Run .github/scripts/modal-bootstrap.sh once to stop skipping.
      - name: Preflight - dev Modal environment/secret
        id: preflight
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: bash .github/scripts/modal-preflight.sh dev voice-service-secrets skip
      - name: Deploy voice-service to Modal (dev)
        if: steps.preflight.outputs.ready == 'true'
        working-directory: apps/voice-service
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_MAX_CONTAINERS: "1"
        run: modal deploy --env dev modal_app.py

  deploy-piper:
    needs: piper-service
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install modal
      - name: Preflight - dev Modal environment/secret
        id: preflight
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: bash .github/scripts/modal-preflight.sh dev piper-service-secrets skip
      - name: Deploy piper-service to Modal (dev)
        if: steps.preflight.outputs.ready == 'true'
        working-directory: apps/piper-service
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_MAX_CONTAINERS: "2"
        run: modal deploy --env dev modal_app.py
