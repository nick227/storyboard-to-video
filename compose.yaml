services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: storyboard
      POSTGRES_USER: storyboard
      POSTGRES_PASSWORD: storyboard
    ports:
      - "5432:5432"
    volumes:
      - storyboard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyboard -d storyboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  storyboard-postgres:
