<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storyboard Image POC</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="eyebrow">Storyboard</div>
          <select id="storyboardPicker" class="storyboard-title" aria-label="Open a saved storyboard"></select>
        </div>
        <div class="toolbar top-actions">
          <button id="newStoryboardBtn" class="secondary">New</button>
          <button id="saveStateBtn" class="secondary" disabled>Saved</button>
          <button id="downloadZipBtn" class="primary">Download</button>
        </div>
      </header>

      <section class="concept-grid">
        <article class="panel concept-column story-concept">
          <div class="concept-heading">
            <div class="eyebrow">Source</div>
            <h2>Story</h2>
          </div>
          <label class="script-field">
            <span>Story / Script</span>
            <textarea id="scriptText" rows="7" placeholder="Paste story or script here..."></textarea>
          </label>
          <div class="compact-fields">
            <label>
              <span>Scene count</span>
              <input id="sceneCount" type="number" min="1" max="50" value="8" />
            </label>
            <label>
              <span>Text provider</span>
              <select id="textProvider">
                <option value="gemini">Gemini</option>
                <option value="openai">OpenAI</option>
              </select>
            </label>
          </div>
        </article>

        <article class="panel concept-column image-concept">
          <div class="concept-heading">
            <div class="eyebrow">Generation</div>
            <h2>Images</h2>
          </div>
          <div class="compact-fields">
              <label>
                <span>Style</span>
                <select id="styleSelect"></select>
              </label>

              <label>
                <span>Image provider</span>
                <select id="imageProvider">
                  <option value="gemini">Gemini</option>
                  <option value="openai">OpenAI</option>
                  <option value="dezgo">Dezgo</option>
                  <option value="stub">Stub Preview (no API)</option>
                </select>
              </label>
          </div>
          <label>
            <span>Common prompt</span>
            <textarea id="commonPromptText" rows="3" placeholder="Style direction applied to prompts and images."></textarea>
          </label>
          <details class="inline-settings">
            <summary>Style references</summary>
            <div class="reference-groups">
              <div class="style-ref-col">
                <div class="style-ref-col-header">
                  <strong>Character references</strong>
                  <label class="upload-chip">
                    <input id="characterRefInput" type="file" accept="image/*" multiple hidden />
                    <span>Upload</span>
                  </label>
                </div>
                <div id="characterRefs" class="style-ref-list"></div>
              </div>
              <div class="style-ref-col">
                <div class="style-ref-col-header">
                  <strong>World references</strong>
                  <label class="upload-chip">
                    <input id="worldRefInput" type="file" accept="image/*" multiple hidden />
                    <span>Upload</span>
                  </label>
                </div>
                <div id="worldRefs" class="style-ref-list"></div>
              </div>
            </div>
          </details>
          <div class="concept-actions">
            <button id="generatePromptsBtn">Generate prompts</button>
            <button id="startSerialBtn" class="primary">Generate images</button>
          </div>
        </article>

        <article class="panel concept-column audio-concept">
          <div class="concept-heading">
            <div class="eyebrow">Generation</div>
            <h2>Audio</h2>
          </div>
          <label>
            <span>Audio provider</span>
            <select id="audioProvider">
              <option value="stub">Local rudimentary voice (no API)</option>
              <option value="piper">Piper (local, natural)</option>
              <option value="elevenlabs">ElevenLabs</option>
            </select>
          </label>
          <details class="inline-settings">
            <summary>Voices</summary>
            <div id="voicesPanel" class="voices-panel"></div>
          </details>
          <div class="concept-actions">
            <button id="generateDialogueBtn">Generate dialogue</button>
            <button id="startAudioSerialBtn" class="primary">Generate audio</button>
          </div>
        </article>

        <article class="panel concept-column video-concept">
          <div class="concept-heading">
            <div class="eyebrow">Generation</div>
            <h2>Video</h2>
          </div>
          <p class="concept-description">Generate video versions from the current image selected in each scene.</p>
          <div class="concept-actions">
            <button id="startVideoSerialBtn" class="primary">Generate videos</button>
          </div>
        </article>
      </section>

      <section class="panel panel-tight status-panel">
        <div class="status-row">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusText" role="status" aria-live="polite">Idle</span>
        </div>
      </section>

      <section class="storyboard-section">
        <div class="storyboard-heading">
          <div>
            <div class="eyebrow">Scenes</div>
            <h2>Storyboard</h2>
          </div>
        </div>
        <div id="storyboardGrid" class="storyboard-grid"></div>
      </section>
    </div>

    <template id="sceneCardTemplate">
      <article class="scene-card">
        <div class="scene-header">
          <div>
            <div class="scene-index"></div>
            <input class="scene-title-input" type="text" aria-label="Scene title" />
          </div>
        </div>

        <div class="scene-image-wrap">
          <img class="scene-image" alt="Scene preview" />
          <video class="scene-video scene-image" autoplay loop muted playsinline aria-label="Animated scene preview"></video>
          <div class="scene-placeholder">No image yet</div>
          <div class="image-loading target-loading" role="status"><span class="spinner"></span><span>Generating image</span></div>
          <div class="video-loading target-loading" role="status"><span class="spinner"></span><span>Generating video</span></div>
        </div>

        <div class="current-audio" hidden>
          <div class="current-audio-heading"><span>Current audio</span><span class="current-audio-version"></span></div>
          <audio class="current-audio-player" controls></audio>
        </div>

        <section class="scene-generation">
          <div class="scene-generation-heading">Generate</div>
          <div class="scene-generation-actions">
            <button class="regen-image-btn">Image</button>
            <button class="regen-video-btn">Video</button>
            <button class="regen-audio-btn">Audio</button>
          </div>
        </section>

        <details class="scene-section scene-details">
          <summary>
            <span><strong>Scene details</strong><span class="beat-summary"></span></span>
            <span class="detail-completeness"></span>
          </summary>
          <div class="scene-section-body scene-fields">
            <label>
              <span>Beat</span>
              <textarea class="scene-beat" rows="2"></textarea>
            </label>

            <label>
              <span class="field-heading"><span>Visual prompt</span><button type="button" class="regen-prompt-btn text-button">Regenerate</button></span>
              <textarea class="scene-prompt" rows="5"></textarea>
              <div class="prompt-loading target-loading" role="status"><span class="spinner"></span><span>Generating prompt</span></div>
            </label>

            <label>
              <span class="field-heading"><span>Dialogue</span><button type="button" class="regen-dialogue-btn text-button">Regenerate</button></span>
              <textarea class="scene-dialogue" rows="4" placeholder="Narrator: ..."></textarea>
              <small>One line per speaker: “Speaker: line”</small>
            </label>
          </div>
        </details>

        <details class="scene-section visual-history-block">
          <summary><strong>Visual history</strong><span class="version-count"></span></summary>
          <div class="scene-section-body history-groups">
            <section class="history-group image-history-group">
              <div class="history-heading"><strong>Images</strong><span class="image-version-count"></span></div>
              <div class="image-version-list version-list"></div>
            </section>
            <section class="history-group video-history-group">
              <div class="history-heading"><strong>Videos</strong><span class="video-version-count"></span></div>
              <div class="video-version-list version-list"></div>
            </section>
          </div>
        </details>

        <details class="scene-section audio-version-block">
          <summary><strong>Audio history</strong><span class="audio-version-count"></span></summary>
          <div class="scene-section-body audio-version-list"></div>
        </details>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
