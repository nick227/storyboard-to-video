<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script — Storyboarder</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/screenplay-editor/screenplay-editor-standalone.css" />
  <link rel="stylesheet" href="/css/scripts-public.css" />
  <script src="/js/shared/topbar.js"></script>
</head>
<body class="scripts-shell">
  <storyboarder-topbar></storyboarder-topbar>
  <main class="script-reader-page">
    <div id="scriptsBreadcrumbs" class="scripts-crumbs-slot"></div>
    <p id="readerStatus" class="scripts-status" role="status">Loading script…</p>
    <article id="readerArticle" class="script-reader" hidden>
      <div class="script-reader-toolbar" role="toolbar" aria-label="Script actions">
        <button type="button" id="scriptLikeBtn" class="script-reader-action" aria-pressed="false" aria-label="Like script">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20s-7-4.4-7-9.2A4.2 4.2 0 0 1 12 7a4.2 4.2 0 0 1 7 3.8C19 15.6 12 20 12 20z"/></svg>
          <span id="scriptLikeCount">0</span>
        </button>
        <button type="button" id="scriptShareBtn" class="script-reader-action" aria-label="Share script">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="18" cy="5" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="19" r="2.5"/><path d="M8.4 13.1 15.6 17M15.6 7 8.4 10.9"/></svg>
          <span>Share</span>
        </button>
        <button type="button" id="scriptFullscreenBtn" class="script-reader-action" aria-pressed="false" aria-label="Full screen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></svg>
          <span data-fullscreen-label>Full screen</span>
        </button>
        <span id="readerToolbarStatus" class="script-reader-toolbar-status" role="status"></span>
      </div>
      <div id="readerStage" class="script-reader-stage">
        <div id="readerCover"></div>
        <div id="readerBody" class="screenplay-editor-wrapper theme-light is-reader">
          <div id="readerWorkspace" class="screenplay-workspace">
            <div id="readerScaleShell" class="screenplay-scale-shell">
              <div id="readerScaleTarget" class="screenplay-scale-target">
                <div id="readerPage" class="script-page"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <aside id="authorBox" class="script-author-box" hidden>
        <div class="script-author-box-head">
          <p class="scripts-kicker">Author</p>
          <h2 id="authorHeading">More by this author</h2>
        </div>
        <div id="authorGrid" class="scripts-grid is-compact"></div>
      </aside>
    </article>
  </main>
  <script type="module" src="/js/pages/script-reader.js"></script>
</body>
</html>
