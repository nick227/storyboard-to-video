<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script — Storyboarder</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="stylesheet" href="/topbar.css" />
  <link rel="stylesheet" href="/scripts-public.css" />
  <script src="/modules/topbar.js"></script>
</head>
<body>
  <storyboarder-topbar></storyboarder-topbar>
  <main class="script-reader-page">
    <p class="script-reader-nav"><a href="/scripts">← All scripts</a></p>
    <p id="readerStatus" class="scripts-status" role="status">Loading script…</p>
    <article id="readerArticle" class="script-reader" hidden>
      <header class="script-reader-cover" aria-label="Screenplay cover">
        <p class="script-reader-cover-label">Screenplay</p>
        <h1 id="readerTitle"></h1>
        <p id="readerAuthor" class="script-reader-author"></p>
      </header>
      <div id="readerBody" class="script-reader-body"></div>
    </article>
  </main>
  <script type="module" src="/modules/script-reader.js"></script>
</body>
</html>
