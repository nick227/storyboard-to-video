<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Script — Storyboarder</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="stylesheet" href="/topbar.css" />
  <link rel="stylesheet" href="/scripts-public.css" />
  <script src="/modules/topbar.js"></script>
</head>
<body>
  <storyboarder-topbar></storyboarder-topbar>
  <main class="script-reader-page">
    <div id="scriptsBreadcrumbs"></div>
    <p id="readerStatus" class="scripts-status" role="status">Loading script…</p>
    <article id="readerArticle" class="script-reader" hidden>
      <div class="script-reader-toolbar">
        <button type="button" id="scriptLikeBtn" class="script-reader-action" aria-pressed="false">
          <span aria-hidden="true">♥</span> <span id="scriptLikeCount">0</span>
        </button>
        <button type="button" id="scriptShareBtn" class="script-reader-action">Share</button>
        <button type="button" id="scriptFullscreenBtn" class="script-reader-action" aria-pressed="false">Full screen</button>
        <span id="readerToolbarStatus" class="script-reader-toolbar-status" role="status"></span>
      </div>
      <div id="readerStage" class="script-reader-stage">
        <div id="readerCover"></div>
        <div id="readerBody" class="script-reader-body"></div>
      </div>
      <aside id="authorBox" class="script-author-box" hidden>
        <h2 id="authorHeading">More by this author</h2>
        <div id="authorGrid" class="scripts-grid is-compact"></div>
      </aside>
    </article>
  </main>
  <script type="module" src="/modules/script-reader.js"></script>
</body>
</html>
