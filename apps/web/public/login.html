<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Storyframe</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/topbar.css" />
  <script src="/modules/topbar.js"></script>
</head>

<body class="auth-page-body">
  <storyframe-topbar></storyframe-topbar>

  <main class="auth-page-main">
    <div class="auth-card">
      <div class="auth-card-heading">
        <div class="eyebrow">Storyframe account</div>
        <h1 id="authCardTitle">Welcome back</h1>
        <p id="authCardSubtitle">Log in to open your storyboards.</p>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Login or create account">
        <button type="button" id="authTabLogin" class="auth-tab" role="tab" aria-selected="true">Log in</button>
        <button type="button" id="authTabRegister" class="auth-tab" role="tab" aria-selected="false">Create account</button>
      </div>

      <form id="authForm" class="auth-form" data-mode="login">
        <label id="authDisplayNameField" hidden>
          <span>Display name</span>
          <input id="authDisplayName" name="displayName" autocomplete="name" maxlength="80" />
        </label>
        <label>
          <span>Email</span>
          <input id="authEmail" name="email" type="email" autocomplete="email" maxlength="320" required />
        </label>
        <label>
          <span>Password</span>
          <input id="authPassword" name="password" type="password" autocomplete="current-password" minlength="4"
            maxlength="1024" required />
        </label>
        <p id="authError" class="auth-error" role="alert"></p>
        <button id="authSubmitBtn" class="primary" type="submit">Log in</button>
      </form>

      <p class="auth-card-footer">
        <span id="authFooterPrompt">New here?</span>
        <a href="#" id="authFooterToggle">Create an account</a>
      </p>
    </div>
  </main>

  <script type="module" src="/modules/auth-page.js"></script>
</body>

</html>
