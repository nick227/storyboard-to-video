# Repo-root Railway config for the web service when Root Directory is the monorepo
# root (default for GitHub-linked services). Prefer setting dashboard Root Directory
# to apps/web later so apps/web/railway.toml is the single source of truth.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["apps/web/**", "Dockerfile", "railway.toml"]

[deploy]
preDeployCommand = ["npm run prisma:migrate:deploy"]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
