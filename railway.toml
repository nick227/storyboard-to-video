# TEMPORARY — delete after setting dashboard Root Directory to apps/web.
# Until then this file (not apps/web/railway.toml) drives the live Railway service.
# Repo-root Railway config for the web service when Root Directory is the monorepo
# root (default for GitHub-linked services).

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["apps/web/**", "Dockerfile", "railway.toml"]

[deploy]
preDeployCommand = ["npm run prisma:migrate:deploy"]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
